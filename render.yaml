# Render Blueprint: https://render.com/docs/blueprint-spec
# Apply from the Render dashboard (New → Blueprint) after connecting this repo.
# Set all secret env vars in the service → Environment tab (do not commit real values).

version: "1"
services:
  - type: web
    name: link-shortener-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm ci && npm run build:api
    startCommand: npm run start:api
    healthCheckPath: /api/v1/health
    buildFilter:
      paths:
        - apps/api/**
        - package.json
        - package-lock.json
    envVars:
      - key: NODE_ENV
        value: production
      # Render injects PORT automatically — keep it or omit; API defaults to 5000 if unset.
      - key: MONGODB_URI
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: APP_PUBLIC_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN_DAYS
        value: "7"
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: CONTACT_TO_EMAIL
        sync: false

  - type: web
    name: link-shortener-web
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm ci && npm run build:web
    startCommand: npm run start:web
    buildFilter:
      paths:
        - apps/web/**
        - package.json
        - package-lock.json
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_RAZORPAY_KEY_ID
        sync: false
